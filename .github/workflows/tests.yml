name: Frontend Checks

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Fallow report
        continue-on-error: true
        run: |
          npx --yes fallow@2.89.0 --format json --quiet --summary > fallow-report.json 2>/dev/null || true
          test -s fallow-report.json || printf '{"error":true,"message":"Fallow report unavailable"}\n' > fallow-report.json

      - name: Upload Fallow report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: fallow-report
          path: fallow-report.json
          retention-days: 7

      - name: Build
        run: npm run build

      - name: Verify build artifact
        run: |
          test -s dist/index.html
          test -s dist/404.html
          test -s dist/links/index.html
          test -s dist/CNAME
          test -s dist/robots.txt
          test -s dist/Jairik_McCauley_Resume.pdf

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        run: npm run test:smoke

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
