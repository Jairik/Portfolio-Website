<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/jj-logo-simple.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Links to JJ McCauley's LinkedIn, email, website, X, and GitHub." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <title>JJ McCauley — Links</title>
    <style>
      :root {
        color-scheme: dark;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        background: radial-gradient(ellipse at top, #1d1f22 0%, #0a0a0a 70%);
        color: #f5f5f5;
        font-family: "Source Sans 3", system-ui, -apple-system, sans-serif;
        font-weight: 400;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 4rem 1.25rem 3rem;
        -webkit-font-smoothing: antialiased;
      }
      main {
        width: 100%;
        max-width: 28rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.75rem;
      }
      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        text-align: center;
      }
      .header img {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: #1d1f22;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .header h1 {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .header p {
        margin: 0;
        color: #a8a8a8;
        font-size: 0.95rem;
      }
      .cards {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      .card {
        display: flex;
        align-items: center;
        gap: 1rem;
        width: 100%;
        padding: 0.95rem 1.15rem;
        background: rgba(29, 31, 34, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        color: #f5f5f5;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        transition: transform 0.15s ease, border-color 0.15s ease,
          background-color 0.15s ease;
      }
      .card:hover,
      .card:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(39, 41, 45, 0.95);
        outline: none;
      }
      .card .icon {
        display: inline-flex;
        width: 28px;
        height: 28px;
        align-items: center;
        justify-content: center;
        color: #f5f5f5;
        flex-shrink: 0;
      }
      .card .icon svg {
        width: 100%;
        height: 100%;
      }
      .card .label {
        flex: 1;
      }
      .card .chev {
        color: #6b6b6b;
        font-size: 1.1rem;
      }
      footer {
        margin-top: 0.5rem;
        color: #6b6b6b;
        font-size: 0.8rem;
      }
      footer a {
        color: inherit;
        text-decoration: none;
      }
      footer a:hover {
        color: #a8a8a8;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <img src="/jj-logo-simple.png" alt="JJ McCauley logo" />
        <h1>JJ McCauley</h1>
        <p>Thank you for visiting, feel free to check out some of my links to learn more or connect!</p>
      </div>

      <nav class="cards" aria-label="Social links">

            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.13 2.07 2.07 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/>

        <a class="card" href="mailto:mjairik@gmail.com">

              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-10 6L2 7"/>
            </svg>
          </span>
          <span class="label">Email</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>

        <a
          class="card"
          href="https://jjmccauley.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>

          </span>

          <span class="chev" aria-hidden="true">→</span>
        </a>

        <a
          class="card"
          href="https://x.com/JairikJJ"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </span>
          <span class="label">X (@JairikJJ)</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>

        <a
          class="card"
          href="https://github.com/Jairik"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 .5C5.73.5.5 5.73.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.69 1.25 3.34.95.1-.74.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.3-.51-1.48.11-3.08 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.78 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.6.24 2.78.12 3.08.73.81 1.18 1.84 1.18 3.1 0 4.43-2.7 5.4-5.27 5.69.41.36.78 1.05.78 2.12v3.15c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5z"/>
            </svg>
          </span>
          <span class="label">GitHub</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>

        <a
          class="card"
          href="https://docs.google.com/presentation/d/1yCKwKY283LoKw8bKfptE9ZvFQMHBj4xMH0BUBmtvsZs/edit?usp=sharing"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 3h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
              <path d="M18 7h4v10h-4"/>
              <path d="M6 8h8"/>
              <path d="M6 12h8"/>
              <path d="M6 16h5"/>
            </svg>
          </span>
          <span class="label">View my AI presentation slides</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>
      </nav>

      <footer>
        <a href="/">← jjmccauley.com</a>
      </footer>
    </main>
  </body>
</html>
