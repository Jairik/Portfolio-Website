<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0e6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2a75d3" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="50%" stop-color="#909090" />
      <stop offset="100%" stop-color="#404040" />
    </linearGradient>
    <linearGradient id="hullDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#606060" />
      <stop offset="100%" stop-color="#202020" />
    </linearGradient>
    
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#55ff55" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#55ff55" stop-opacity="0.0" />
    </linearGradient>
    
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5555" />
      <stop offset="100%" stop-color="#aa0000" />
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#55ffff" />
      <stop offset="100%" stop-color="#00aaaa" />
    </radialGradient>
  </defs>

  <circle cx="50" cy="100" r="1.5" fill="#ffffff" opacity="0.8" />
  <circle cx="150" cy="50" r="2" fill="#ffffff" opacity="0.6" />
  <circle cx="350" cy="120" r="1" fill="#ffffff" opacity="0.9" />
  <circle cx="450" cy="60" r="2.5" fill="#ffffff" opacity="0.5" />
  <circle cx="80" cy="300" r="1" fill="#ffffff" opacity="0.4" />
  <circle cx="420" cy="280" r="1.5" fill="#ffffff" opacity="0.7" />
  <circle cx="280" cy="40" r="1.5" fill="#ffffff" opacity="0.8" />
  <circle cx="470" cy="400" r="2" fill="#ffffff" opacity="0.5" />

  <polygon points="250,270 120,500 380,500" fill="url(#beamGrad)" />

  <ellipse cx="250" cy="275" rx="80" ry="25" fill="url(#hullDark)" />

  <ellipse cx="250" cy="240" rx="200" ry="45" fill="url(#hullGrad)" />

  <ellipse cx="250" cy="220" rx="130" ry="30" fill="url(#hullDark)" />

  <ellipse cx="250" cy="210" rx="75" ry="20" fill="#112233" opacity="0.8" />

  <path d="M 165 210 A 85 70 0 0 1 335 210 Z" fill="url(#glassGrad)" />
  <ellipse cx="250" cy="210" rx="85" ry="15" fill="url(#glassGrad)" />

  <text x="250" y="195" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1" opacity="0.9">JJ</text>

  <path d="M 180 180 A 50 40 0 0 1 250 145 A 70 50 0 0 0 180 180 Z" fill="url(#glassShine)" />

  <circle cx="70" cy="240" r="6" fill="url(#glowRed)" />
  <circle cx="120" cy="255" r="8" fill="url(#glowCyan)" />
  <circle cx="180" cy="265" r="9" fill="url(#glowRed)" />
  <circle cx="250" cy="270" r="10" fill="url(#glowCyan)" />
  <circle cx="320" cy="265" r="9" fill="url(#glowRed)" />
  <circle cx="380" cy="255" r="8" fill="url(#glowCyan)" />
  <circle cx="430" cy="240" r="6" fill="url(#glowRed)" />
</svg>
